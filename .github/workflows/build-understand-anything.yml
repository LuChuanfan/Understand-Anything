name: Build Understand Anything Portable Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm from packageManager
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show versions
        working-directory: understand-anything-plugin
        run: |
          node --version
          pnpm --version

      - name: Configure portable pnpm
        working-directory: understand-anything-plugin
        shell: bash
        run: |
          cat > .npmrc <<'EOF'
          store-dir=.pnpm-store
          package-import-method=copy
          prefer-offline=true
          offline=false
          registry=https://registry.npmjs.org/
          EOF
          cat .npmrc

      - name: Install dependencies into local store
        working-directory: understand-anything-plugin
        run: pnpm install --no-frozen-lockfile

      - name: Build core
        working-directory: understand-anything-plugin
        run: pnpm --filter "./packages/core" build

      - name: Build dashboard with vite only
        working-directory: understand-anything-plugin
        run: pnpm --filter "./packages/dashboard" exec vite build

      - name: Verify vite exists
        shell: pwsh
        run: |
          Test-Path "understand-anything-plugin/packages/dashboard/node_modules/.bin/vite.cmd"
          Get-ChildItem "understand-anything-plugin/packages/dashboard/node_modules/.bin" | Select-Object Name

      - name: Switch package to offline mode
        working-directory: understand-anything-plugin
        shell: bash
        run: |
          cat > .npmrc <<'EOF'
          store-dir=.pnpm-store
          package-import-method=copy
          prefer-offline=true
          offline=true
          registry=https://registry.npmjs.org/
          EOF
          cat .npmrc

      - name: Pack portable plugin
        run: tar -czf understand-anything-plugin-portable.tgz understand-anything-plugin

      - name: Upload portable plugin
        uses: actions/upload-artifact@v4
        with:
          name: understand-anything-plugin-portable
          path: understand-anything-plugin-portable.tgz
