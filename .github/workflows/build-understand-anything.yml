name: Build Understand Anything Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm from packageManager
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        working-directory: understand-anything-plugin
        run: pnpm install --no-frozen-lockfile

      - name: Show workspace packages
        working-directory: understand-anything-plugin
        run: pnpm -r list --depth -1

      - name: Build core first
        working-directory: understand-anything-plugin
        run: pnpm --filter ./packages/core build

      - name: Patch dashboard build script to skip tsc typecheck
        shell: pwsh
        run: |
          $pkg = "understand-anything-plugin/packages/dashboard/package.json"
          @@@MATH_INLINE_0_END@@@pkg -Raw | ConvertFrom-Json

          Write-Host "Old dashboard build script:"
          Write-Host $json.scripts.build

          $json.scripts.build = "vite build"

          @@@MATH_INLINE_1_END@@@pkg -Encoding UTF8

          Write-Host "New dashboard build script:"
          Get-Content $pkg

      - name: Build dashboard
        working-directory: understand-anything-plugin
        run: pnpm --filter ./packages/dashboard build

      - name: Pack built plugin
        run: tar -czf understand-anything-plugin-built.tgz understand-anything-plugin

      - name: Upload built plugin
        uses: actions/upload-artifact@v4
        with:
          name: understand-anything-plugin-built
          path: understand-anything-plugin-built.tgz
